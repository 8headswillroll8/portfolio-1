<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lene Johansen | Frontend Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/icons/red-head-emoji-favicon.webp" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <nav class="header__wrapper">
        <div class="header__text">
          <p>Lene Johansen</p>
          <p>Portfolio 2025 — 2026</p>
        </div>
        <button class="btn btn--sm">Contact</button>
      </nav>
    </header>
    <main>
      <!-- Hero -->
      <section class="hero">
        <div class="hero__wrapper">
          <div class="hero__intro">
            <h1 class="hero__title">
              Hello! I'm Lene. A frontend student, building tiny things toward
              <span class="hero__arrow"></span>
              bigger ones.
            </h1>
          </div>

          <div class="hero__content">
            <div class="hero__action">
              <p>Scroll down</p>
              <img src="./assets/icons/arrow-down.svg" alt="" />
            </div>

            <!-- Portrait -->
            <div class="portrait">
              <div class="portrait__inner">
                <img
                  src="./assets/images/self-portrait.webp"
                  alt="Self portrait of Lene Johansen"
                  class="portrait__face portrait__face--front"
                />
                <img
                  class="portrait__face portrait__face--back"
                  src="./assets/images/young-lene-at-computer.webp"
                  alt="Portrait of young Lene Johansen at the computer"
                />
              </div>
            </div>
            <p class="hero__quote">
              Ever since I was a little girl, I knew I wanted to be on the
              computer a lot.
            </p>
          </div>
        </div>
      </section>

      <!-- Projects -->
      <section class="projects">
        <h2 class="projects_title">Projects</h2>
        <div class="projects__grid">
          <!-- Cards rendered from data.js -->
        </div>
      </section>
    </main>
    <footer>
      <h3 class="footer_email">lejohansen91@gmail.com</h3>
      <div class="footer__links">
        <ul>
          <li>
            <a
              href="https://github.com/8headswillroll8"
              target="_blank"
              rel="noopener noreferrer"
              >Github</a
            >
          </li>
          <li>
            <a
              href="https://www.linkedin.com/in/lene-johansen-1a4ab5245/"
              target="_blank"
              rel="noopener noreferrer"
              >LinkedIn</a
            >
          </li>
          <li>
            <a href="#">CV</a>
          </li>
        </ul>
      </div>
    </footer>
    <script type="module" src="./js/renderCard.js"></script>
    <script type="module" src="./js/flipPortrait.js"></script>
  </body>
</html>
